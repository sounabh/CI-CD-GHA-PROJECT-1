name: Artifacts

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - name: Upload source code
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: src/index.js
          retention-days: 30

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./app

      - run: ls -la ./app
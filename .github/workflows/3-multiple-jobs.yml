name: Multiple jobs

on: push

jobs:

  # First job
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install
      - run: npm test

  # Second job
  build:
    name: Build app
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install
      - run: npm run build

  # Third job
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [test, build]

    steps:
      - name: Deploy
        run: echo "Deploying to production 🔥🗣️"
name: Multiple jobs

on: push

jobs:

#first job

 test:
  name: Run Tests
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
    - run: npm install
    - run: npm test

  build:
  #second job

  name: Build app
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
    - run: npm install
    - run: npm run build


  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [test,build]  
    steps:
     - name: Deploy
       run: echo "Deploying to production 🔥🗣️"
 